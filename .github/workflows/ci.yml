name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Python dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff lint
        run: python -m ruff check .

      - name: Ruff format check
        run: python -m ruff format --check .

  test-ubuntu:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    env:
      PYTHONUTF8: "1"
      PYTHONIOENCODING: "utf-8"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Python dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Verify configs
        run: |
          node --version
          npm --version
          node -e "JSON.parse(require('fs').readFileSync('package.json', 'utf8')); console.log('package.json ok')"

      - name: Compile Python files
        run: python -m compileall -q starbridge_mcp scripts examples tests

      - name: Run Python tests
        run: python -m unittest discover -s tests

      - name: Run safe bridge checks
        run: |
          python scripts/security_check.py
          python scripts/collect_bridge_status.py --json
          python examples/bridge_status.py --json --redact-paths --soft-exit
          python -m starbridge_mcp.server tools --json --safe-only
          python -m starbridge_mcp.server evidence --init --json
          python -m starbridge_mcp.server evidence --validate --json
          python -m starbridge_mcp.server job-status --json

      - name: Run StarBridge preflight
        run: python scripts/starbridge_preflight.py --markdown

      - name: Run npm scripts
        run: npm test

  test-windows:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]
    env:
      PYTHONUTF8: "1"
      PYTHONIOENCODING: "utf-8"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Python dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run security check (Windows)
        run: python scripts/security_check.py

      - name: Run preflight
        run: python scripts/starbridge_preflight.py --markdown

      - name: Run basic Python tests
        run: python -m unittest discover -s tests

      - name: Verify npm
        run: npm.cmd test
