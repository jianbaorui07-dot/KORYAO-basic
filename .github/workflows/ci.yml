name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-ubuntu:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    env:
      PYTHONUTF8: "1"
      PYTHONIOENCODING: "utf-8"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: 'npm'

      - name: Install Python dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" || pip install pytest

      - name: Verify configs
        run: |
          node --version
          npm --version
          node -e "JSON.parse(require('fs').readFileSync('package.json', 'utf8')); console.log('package.json ok')"

      - name: Run Python tests (unittest)
        run: python -m unittest discover -s tests

      - name: Run pytest if available
        run: python -m pytest --tb=short || echo "pytest optional"

      - name: Run StarBridge preflight
        run: python scripts/starbridge_preflight.py --markdown

      - name: Run security check
        run: python scripts/security_check.py

      - name: Run npm scripts
        run: npm test

  test-windows:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run security check (Windows)
        run: python scripts/security_check.py

      - name: Run preflight
        run: python scripts/starbridge_preflight.py --markdown

      - name: Run basic Python tests
        run: python -m unittest discover -s tests

      - name: Verify npm
        run: npm test
