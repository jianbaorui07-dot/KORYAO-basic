name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Python dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff lint
        run: python -m ruff check .

      - name: Ruff format check
        run: python -m ruff format --check .

  test-ubuntu:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    env:
      PYTHONUTF8: "1"
      PYTHONIOENCODING: "utf-8"
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "22"

      - name: Install Python dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Verify configs
        run: |
          node --version
          npm --version
          node -e "JSON.parse(require('fs').readFileSync('package.json', 'utf8')); console.log('package.json ok')"

      - name: Compile Python files
        run: python -m compileall -q starbridge_mcp scripts examples tests

      - name: Run Python tests
        run: python -m unittest discover -s tests

      - name: Run safe bridge checks
        run: |
          python scripts/security_check.py
          python scripts/check_product_facts.py
          python scripts/check_text_encoding.py
          python scripts/collect_bridge_status.py --json
          python examples/bridge_status.py --json --redact-paths --soft-exit
          python -m starbridge_mcp.server tools --json --safe-only
          python -m starbridge_mcp.server evidence --init --json
          python -m starbridge_mcp.server evidence --validate --json
          python -m starbridge_mcp.server job-status --json

      - name: Run CreNexus preflight
        run: python scripts/starbridge_preflight.py --markdown

      - name: Run npm scripts
        run: npm test

  test-windows:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]
    env:
      PYTHONUTF8: "1"
      PYTHONIOENCODING: "utf-8"
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "22"

      - name: Install Python dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run security check (Windows)
        run: |
          python scripts/security_check.py
          python scripts/check_product_facts.py
          python scripts/check_text_encoding.py

      - name: Run preflight
        run: python scripts/starbridge_preflight.py --markdown

      - name: Run basic Python tests
        run: python -m unittest discover -s tests

      - name: Verify npm
        run: npm.cmd test

  test-desktop-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/starbridge-desktop/package-lock.json

      - name: Install desktop dependencies from lockfile
        run: npm ci --prefix apps/starbridge-desktop

      - name: Test desktop frontend
        run: npm test --prefix apps/starbridge-desktop

      - name: Build desktop frontend
        run: npm run build --prefix apps/starbridge-desktop

  test-desktop-rust:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Check Rust formatting
        run: cargo fmt --manifest-path apps/starbridge-desktop/src-tauri/Cargo.toml --all -- --check

      - name: Prepare Tauri test resources
        shell: pwsh
        run: |
          $sidecarDir = "apps/starbridge-desktop/src-tauri/binaries"
          New-Item -ItemType Directory -Force -Path "$sidecarDir/_internal" | Out-Null
          New-Item -ItemType File -Force -Path "$sidecarDir/_internal/.ci-placeholder" | Out-Null
          New-Item -ItemType File -Force -Path "$sidecarDir/starbridge-sidecar-x86_64-pc-windows-msvc.exe" | Out-Null

      - name: Test Tauri shell
        run: cargo test --manifest-path apps/starbridge-desktop/src-tauri/Cargo.toml

  test-illustrator-headless-trace:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python-version: "3.10"
          - os: ubuntu-latest
            python-version: "3.11"
          - os: ubuntu-latest
            python-version: "3.12"
          - os: ubuntu-latest
            python-version: "3.13"
          - os: windows-latest
            python-version: "3.12"
    runs-on: ${{ matrix.os }}
    env:
      PYTHONUTF8: "1"
      PYTHONIOENCODING: "utf-8"
      STARBRIDGE_REQUIRE_TRACE_RUNTIME: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install color trace test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,illustrator-trace,vectorization]"

      - name: Verify color trace runtime imports
        run: python -c "import cv2, numpy, PIL; print(cv2.__version__, numpy.__version__, PIL.__version__)"

      - name: Run real headless color raster to SVG closed-loop tests
        run: python -m unittest tests.test_illustrator_color_trace tests.test_vectorization_modes tests.test_smart_vector_refinement_skill

  test-image-to-psd-headless:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python-version: "3.10"
          - os: ubuntu-latest
            python-version: "3.11"
          - os: ubuntu-latest
            python-version: "3.12"
          - os: ubuntu-latest
            python-version: "3.13"
          - os: windows-latest
            python-version: "3.12"
    runs-on: ${{ matrix.os }}
    env:
      PYTHONUTF8: "1"
      PYTHONIOENCODING: "utf-8"
      STARBRIDGE_REQUIRE_IMAGE_TO_PSD_RUNTIME: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install image-to-PSD test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,image-to-psd]"

      - name: Verify image decomposition runtime imports
        run: python -c "import cv2, numpy, PIL; print(cv2.__version__, numpy.__version__, PIL.__version__)"

      - name: Run real headless image-to-layer-assets closed-loop tests
        run: >-
          python -m unittest
          tests.test_photoshop_semantic_layers
          tests.test_photoshop_github_feedback
          tests.test_photoshop_public_dataset
          tests.test_photoshop_public_experiment
          tests.test_photoshop_training

      - name: Run public cross-intent synthetic regression
        run: >-
          python -m starbridge_mcp.adapters.photoshop.semantic_layers.cli regression
          --output-root examples/output/photoshop/ci-synthetic-regression
          --confirm-write
