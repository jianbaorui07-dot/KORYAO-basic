<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>CreNexus Illustrator</title>
  <link rel="stylesheet" href="src/styles.css">
</head>
<body>
  <main>
    <span class="eyebrow">CRENEXUS</span>
    <h1>Codex Live</h1>
    <p class="muted">Codex 的当前步骤会直接显示在 Illustrator 内。</p>

    <section class="session-card" id="session-card" data-phase="idle" aria-live="polite">
      <div class="session-heading">
        <span class="status-dot"></span>
        <strong id="session-phase">等待任务</strong>
        <span id="session-step">—</span>
      </div>
      <p id="session-message">连接代理后，执行状态会显示在这里。</p>
      <div class="progress-track" role="progressbar" aria-label="Codex 任务进度" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
        <span id="session-progress"></span>
      </div>
      <dl class="session-details">
        <dt>方式</dt><dd id="session-mode">结构化命令</dd>
        <dt>更新</dt><dd id="session-time">—</dd>
      </dl>
    </section>

    <dl class="bridge-details">
      <dt>代理</dt><dd id="connection">连接中</dd>
      <dt>宿主</dt><dd id="host">检测中</dd>
      <dt>文档</dt><dd id="document">未读取</dd>
      <dt>选择</dt><dd id="selection">0</dd>
      <dt>最后同步</dt><dd id="synced">—</dd>
    </dl>
    <button id="reconnect" type="button">重新连接</button>
    <button id="push-state" type="button">立即同步</button>
    <pre id="message"></pre>
    <p class="warning">需要确认的写操作仍会暂停等待确认；状态文字不代替画板结果验证。</p>
  </main>
  <script type="module" src="src/index.js"></script>
</body>
</html>
